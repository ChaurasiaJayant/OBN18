<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task</title>
  </head>
  <body>
    <form action="#">
      <input type="text" placeholder="Enter your name" id="name" />
      <input type="number" placeholder="Enter your age" id="age" />
      <button onclick="AddStudent()">Add Student</button>

      <ul id="list"></ul>
    </form>

    <script>
      class Student {
        constructor(name, age) {
          this.id = Date.now();
          this.name = name;
          this.age = age;
        }
      }

      class StudentManager {
        constructor() {
          this.students = JSON.parse(localStorage.getItem("studentss")) || [];
        }

        addStudents(student) {
          this.students.push(student);
          this.save();
        }

        save() {
          localStorage.setItem("studentss", JSON.stringify(this.students));
        }

        delete(id) {
          this.students = this.students.filter((student) => student.id !== id);
          this.save();
        }

        display() {
          let list = document.getElementById("list");
          list.innerHTML = "";

          this.students.forEach((student) => {
            let li = document.createElement("li");
            li.innerHTML = `${student.name} - ${student.age} <button onclick = "removeStudent(${student.id})">Delete</button>`;
            list.appendChild(li);
          });
        }
      }

      const manager = new StudentManager();

      manager.display();

      function removeStudent(id) {
        manager.delete(id);
        manager.display();
      }

      function AddStudent() {
        let name = document.getElementById("name");
        let age = document.getElementById("age");

        const newStudent = new Student(name.value, age.value);

        manager.addStudents(newStudent);
        manager.display();
        manager.save();
      }
    </script>
  </body>
</html>
