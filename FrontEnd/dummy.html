<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
      }
      .tbl {
        border-radius: 6px;
      }
      table {
        border-radius: 6px;
        border-collapse: collapse;
        width: 100vw;
        text-align: center;
      }
      th {
        font-size: 12px;
        padding: 10px;
      }

      .bluee {
        background-color: rgb(49, 85, 201);
        color: white;
      }
      .gray {
        background-color: rgb(216, 213, 213);
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="tbl">
      <table>
        <thead>
          <tr class="bluee">
            <th>NAME</th>
            <th>KILLS</th>
            <th>SAVED</th>
            <th>DEATHS</th>
            <th>REVIVES</th>
            <th>WIN</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Hackerman</td>
            <td>10</td>
            <td>0</td>
            <td>1</td>
            <td>0</td>
            <td>0</td>
          </tr>
          <tr class="gray">
            <td>Cool Doggo</td>
            <td>13</td>
            <td>4</td>
            <td>8</td>
            <td>7</td>
            <td>1</td>
          </tr>
          <tr>
            <td>Andrews</td>
            <td>19</td>
            <td>2</td>
            <td>10</td>
            <td>11</td>
            <td>0</td>
          </tr>
          <tr class="gray">
            <td>Strawberry</td>
            <td>10</td>
            <td>0</td>
            <td>1</td>
            <td>0</td>
            <td>0</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
