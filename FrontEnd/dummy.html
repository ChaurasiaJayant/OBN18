<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .col {
        height: 400px;
        width: 600px;
        display: grid;
        grid-template-columns: repeat(4, 25%);
        grid-template-rows: repeat(4, 25%);
        gap: 10px;
      }
      .one {
        display: grid;
        grid-area: 1/1/4/1;
        background-color: green;
      }
      .two {
        background-color: green;
        display: grid;
        grid-area: 1/2/1/4;
      }
      .three {
        background-color: red;
      }
      .four {
        display: grid;
        background-color: orange;
      }
      .five {
        background-color: red;
      }
      .six {
        background-color: green;
        display: grid;
        grid-area: 2/4/4/5;
      }
      .seven {
        background-color: red;
      }
      .eight {
        background-color: orange;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="col">
        <div class="one"></div>
        <div class="two"></div>
        <div class="three"></div>
        <div class="four"></div>
        <div class="five"></div>
        <div class="six"></div>
        <div class="seven"></div>
        <div class="eight"></div>
      </div>
    </div>
  </body>
</html>
