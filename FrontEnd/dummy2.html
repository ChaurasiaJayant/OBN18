<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Page title</title>
    <style>
      .container {
        width: 400px;
        height: 300px;
        background-color: blue;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
      }

      .box1 {
        grid-area: 1/1/3/3;
      }

      .box2 {
        grid-row: 1/2;
        grid-column: 2/3;
      }

      .box3 {
        grid-row: 1/2;
        grid-column: 3/4;
      }

      .box4 {
        grid-area: 2/3/4/4;
      }

      .grid5 {
        grid-row: 2/3;
        grid-column: 3/4;
      }

      .box6 {
        grid-area: 3/1/3/3;
      }

      .grid7 {
        grid-row: 3/4;
        grid-column: 3/4;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box box1" style="background-color: red">A</div>

      <div class="box box2" style="background-color: #0081ff">B</div>

      <div class="box box3" style="background-color: #e32aff">C</div>

      <div class="box box4" style="background-color: #a5ff55">D</div>

      <div class="box box5" style="background-color: #80c1ff">E</div>

      <div class="box box6" style="background-color: yellow">F</div>

      <div class="box box7" style="background-color: #ff95a9">G</div>
    </div>
  </body>
</html>
