<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        border: 2px solid black;
      }
      td,
      th {
        border: 1px solid black;
        text-align: center;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        New Employees Records
      </caption>
      <thead>
        <tr>
          <th>Name</th>
          <th colspan="2">Jobs</th>
          <th>Working Experience</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>John</td>
          <td>Software Engineer</td>
          <td>Data Analyst</td>
          <td rowspan="2">5years</td>
        </tr>

        <tr>
          <td>Ale</td>
          <td colspan="2">Senior Software Developer</td>
        </tr>

        <tr>
          <td>Jack</td>
          <td>Junior Tech Writer</td>
          <td>Blogger</td>
          <td>6 months</td>
        </tr>
      </tbody>
    </table>

    <table>
      <caption>
        HTML table
      </caption>
      <tr>
        <td colspan="2">Cell 1</td>
        <td>Cell 2</td>
        <td>Cell 3</td>
      </tr>

      <tr>
        <td rowspan="3">Cell 4</td>
        <td>Cell 5</td>
        <td>Cell 6</td>
        <td>Cell 7</td>
      </tr>

      <tr>
        <td colspan="3">Cell 8</td>
      </tr>
      <tr>
        <td>Cell 9</td>
        <td colspan="2">Cell 10</td>
      </tr>
    </table>
  </body>
</html>
