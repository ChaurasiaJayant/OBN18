<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .gridOne {
        box-sizing: border-box;
        padding: 10px;
        display: grid;
        height: 600px;
        grid-template-rows: repeat(4, minmax(100px, auto));
        width: 600px;
        grid-template-columns: repeat(3, minmax(100px, 1fr));
        gap: 10px;
      }
      .g1 {
        background-color: orange;
        grid-area: 1/1/2/4;
      }
      .g2 {
        background-color: red;
        grid-area: 2/1/5/2;
      }
      .g3 {
        background-color: greenyellow;
        grid-area: 2/2/3/4;
      }
      .g4 {
        background-color: aquamarine;
        grid-area: 4/1/5/4;
      }
      .g5 {
        background-color: pink;
      }
      .g6 {
        background-color: yellow;
      }

      .gridTwo {
        /* box-sizing: border-box; */
        margin: 50px;
        gap: 10px;
        display: grid;
        height: 500px;
        width: 800px;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(5, 1fr);
        /* background-color: rgb(10, 10, 45); */
      }
      .a1 {
        background-color: rgb(237, 68, 21);
        grid-area: 1/1/2/3;
      }
      .a2 {
        background-color: rgb(246, 163, 18);
        grid-area: 3/1/5/3;
      }
      .a3 {
        background-color: teal;
      }
      .a4 {
        background-color: aquamarine;
        grid-area: 5/1/6/4;
      }
      .a5 {
        background-color: rgb(255, 0, 0);
      }
      .a6 {
        background-color: teal;
      }
      .a7 {
        background-color: #10b4af;
      }
      .a8 {
        background-color: rgb(186, 247, 63);
      }
      .a9 {
        background-color: rgb(25, 227, 14);
      }
      .a10 {
        background-color: rgb(200, 28, 103);
        grid-area: 2/4/4/5;
      }
      .a11 {
        background-color: rgb(234, 90, 90);
      }
      .a12 {
        background-color: rgb(32, 92, 92);
      }
      .a13 {
        background-color: rgb(244, 103, 234);
      }
      .a14 {
        background-color: rgb(114, 223, 55);
      }

      .gridThree {
        margin: 10px;
        height: 300px;
        width: 400px;
        display: grid;
        grid-template-columns: repeat(4, 25%);
        grid-template-rows: repeat(3, 33.33%);
        /* background-color: yellow; */
        gap: 10px;
      }
      .t1 {
        background-color: red;
        grid-area: 1/1/3/3;
      }
      .t2 {
        background-color: greenyellow;
        grid-area: 3/1/3/3;
      }
      .t3 {
        background-color: pink;
        grid-area: 2/3/4/4;
      }
      .t4 {
        background-color: rgb(142, 86, 86);
      }
      .t5 {
        background-color: rgb(193, 171, 47);
      }
      .t6 {
        background-color: rgb(121, 50, 147);
      }
      .t7 {
        background-color: rgb(142, 86, 86);
      }

      @media screen and (max-width: 768px) {
        .gridThree {
          height: 100vh;
          width: 100vw;
          display: grid;
          grid-template-columns: repeat(2, 50%);
          grid-template-rows: repeat(6, 100px);
          gap: 10px;
        }
        .t1 {
          background-color: red;
          grid-area: 1/1/3/3;
        }
        .t2 {
          background-color: greenyellow;
          grid-area: 6/1/7/3;
        }
        .t3 {
          background-color: pink;
          grid-area: 4/1/6/2;
        }
      }
    </style>
  </head>
  <body>
    <div class="gridOne">
      <div class="g1"></div>
      <div class="g2"></div>
      <div class="g3"></div>
      <div class="g4"></div>
      <div class="g5"></div>
      <div class="g6"></div>
    </div>

    <div class="gridTwo">
      <div class="a1"></div>
      <div class="a2"></div>
      <div class="a3"></div>
      <div class="a4"></div>
      <div class="a5"></div>
      <div class="a6"></div>
      <div class="a7"></div>
      <div class="a8"></div>
      <div class="a9"></div>
      <div class="a10"></div>
      <div class="a11"></div>
      <div class="a12"></div>
      <div class="a13"></div>
      <div class="a14"></div>
      <div class="a15"></div>
      <div class="a16"></div>
      <div class="a17"></div>
      <div class="a18"></div>
    </div>

    <div class="gridThree">
      <div class="t1">A</div>
      <div class="t2">F</div>
      <div class="t3"></div>
      <div class="t4"></div>
      <div class="t5"></div>
      <div class="t6"></div>
      <div class="t7"></div>
    </div>
  </body>
</html>
