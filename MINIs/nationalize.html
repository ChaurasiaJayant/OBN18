<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background: #2a7b9b;
        background: radial-gradient(
          circle,
          rgba(42, 123, 155, 1) 0%,
          rgba(87, 199, 133, 1) 50%,
          rgba(237, 221, 83, 1) 100%
        );
        background-repeat: no-repeat;
        object-fit: cover;
        color: white;
        font-size: larger;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      .parent {
        display: flex;
        flex-direction: column;
        align-items: center;
        /* justify-content: center; */
        gap: 20px;
        margin-top: 20px;
      }
      h1 {
        font-size: 3rem;
      }
      input {
        padding: 10px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid grey;
        width: 20rem;
      }
      /* button {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid grey;
        width: 15rem;
      } */
      .btn-grad {
        background-image: linear-gradient(
          to right,
          #16a085 0%,
          #f4d03f 51%,
          #16a085 100%
        );
      }

      .btn-grad {
        margin: 10px;
        padding: 15px 45px;
        text-align: center;
        text-transform: uppercase;
        transition: 0.5s;
        background-size: 200% auto;
        color: white;
        box-shadow: 0 0 20px #eee;
        border-radius: 10px;
        display: block;
        outline: none;
        border: none;
      }

      .btn-grad:hover {
        background-position: right center;
        color: #fff;
        text-decoration: none;
      }

      #list {
      }
      .lis {
        list-style: none;
        padding: 10px;
        border: 2px solid white;
        border-radius: 10px;
        font-size: 1.6rem;
        margin: 10px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <h1>Nationality Predictor</h1>
      <input type="text" id="inp" placeholder="Enter the name" />
      <button id="btn" class="btn-grad">Search</button>
      <ul id="list"></ul>
    </div>

    <script>
      let list = document.getElementById("list");
      const btn = document.getElementById("btn");
      btn.addEventListener("click", () => {
        let input = document.getElementById("inp").value.trim();

        if (!input) return;

        getData(input);
      });

      async function getData(input) {
        let response = await fetch(`https://api.nationalize.io?name=${input}`);
        let data = await response.json();

        console.log(data);

        render(data);
      }

      function render(data) {
        let countries = data.country;
        console.log(countries);
        const countryName = new Intl.DisplayNames(["en"], { type: "region" });

        list.innerHTML = countries
          .map((el) => {
            return `<div class = "lis"> <li>Country : ${countryName.of(el.country_id)} and the probability is :${el.probability}</li></div>`;
          })
          .join("");
      }
    </script>
  </body>
</html>
