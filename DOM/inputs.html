<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        width: 100vw;
        background-color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
      }

      #filee {
        display: none;
      }
      .inp {
        padding: 10px 20px;
        background-color: rgb(27, 227, 140);
        border-radius: 5px;
      }

      .inp:hover {
        background-color: rgb(21, 138, 87);
      }
    </style>
  </head>
  <body>
    <div id="main">
      <input type="file" name="" id="filee" />

      <div class="inp">Upload file</div>
    </div>

    <script>
      const first = document.querySelector(".inp");
      const second = document.querySelector("#filee");

      first.addEventListener("click", () => {
        second.click();
      });

      second.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          first.textContent = file.name;
        }
      });
    </script>
  </body>
</html>
