<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #333;
        padding: 30px;
      }
      .card {
        max-width: 300px;
        margin-top: 40px;
        border-radius: 10px;
        border: 1px solid #555;
        display: inline-block;
        padding: 20px;
        color: white;
      }
      input {
        padding: 5px 10px;
        border-radius: 4px;
      }
      .profile {
        width: 50px;
        height: 50px;
        background-color: red;
        border-radius: 50%;
        margin-bottom: 10px;
      }

      .profile img {
        width: 100%;
        height: 100%;
        overflow: hidden;
        object-fit: cover;
        border-radius: 50%;
      }

      .card h5 {
        margin-top: 5px;
      }

      .card p {
        font-size: 12px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <form action="">
      <input type="text" placeholder="name" name="" id="" />
      <input type="text" placeholder="age" name="" id="" />
      <input type="email" placeholder="email" name="" id="" />
      <input type="url" placeholder="profile pic" name="" id="" />
      <button>Submit</button>
    </form>

    <div class="card">
      <div class="profile">
        <img
          src="https://images.unsplash.com/photo-1769095383907-b38b0b72b694?w=700&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw1Nnx8fGVufDB8fHx8fA%3D%3D"
          alt="hell"
        />
      </div>
      <h3>Jayant Chaurasia</h3>
      <h5>Coder</h5>
      <p>
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Soluta libero
        quo dolorem, unde obcaecati doloremque maxime nobis aliquid non beatae
        sed vitae, veniam quos?
      </p>
    </div>

    <script>
      let form = document.querySelector("form");
      let inputs = document.querySelectorAll("input");

      form.addEventListener("submit", (dets) => {
        dets.preventDefault();
      });

      let card = document.createElement("div");
      card.classList.add("card");

      let profile = document.createElement("div");
      profile.classList.add("profile");

      let img = document.createElement("img");
      img.setAttribute(
        "src",
        "https://images.unsplash.com/photo-1776549821171-fd5b5d310f30?w=700&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw2NXx8fGVufDB8fHx8fA%3D%3D",
      );

      let h3 = document.createElement("h5");
      let h5 = document.createElement("h3");
      let p = document.createElement("p");
    </script>
  </body>
</html>
