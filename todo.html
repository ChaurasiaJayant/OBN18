<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>To Do</h1>
    <input id="input" type="text" placeholder="Enter Task" />
    <button id="btn">Add Task+</button>
    <ul id="list"></ul>

    <script>
      let arr = [];
      let list = document.getElementById("list");
      let btn = document.getElementById("btn");

      btn.addEventListener("click", () => {
        let input = document.getElementById("input").value.trim();

        if (!input) {
          return;
        }
        arr.push({ input, id: Date.now() });
        render();
        document.getElementById("input").value = "";
      });
      function deleteTask(id) {
        arr = arr.filter((el) => el.id !== id);
        render();
      }

      function editTask(inp, id) {
        let newInp = prompt("Enter the task to edit", inp);
        if (!newInp) return;
        arr = arr.map((el) => (el.id === id ? { ...el, input: newInp } : el));
        render();
      }

      function render() {
        list.innerHTML = arr
          .map(
            (el) =>
              `<li>${el.input} <button onclick = "editTask('${el.input}',${el.id})">Edit</button><button onclick = "deleteTask(${el.id})">Delete</button></li>  `,
          )
          .join("");
      }
    </script>
  </body>
</html>
